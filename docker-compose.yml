version: '3.8'

services:
  hpdc-engine:
    build: .
    image: hpdc-engine:v2.1.1
    container_name: hpdc-engine-prod
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - FLASK_APP=backend.app:app
      - PYTHONPATH=/app
      - MALLOC_ARENA_MAX=2
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HPDC_LOCAL_AGENT.v1 | Mission Control</title>
    
    <!-- CDNs -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/STLLoader.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="/static/style.css">
</head>
<body x-data="app()" x-init="initApp()" class="bg-[#050505] text-white font-sans selection:bg-cyan-500/30 overflow-x-hidden">

    <!-- Global Grid Background -->
    <div class="fixed inset-0 opacity-[0.03] pointer-events-none z-0" 
         style="background-image: radial-gradient(circle at 2px 2px, #00f3ff 1px, transparent 0); background-size: 32px 32px;"></div>

    <main class="relative z-10 max-w-[1440px] mx-auto p-6 md:p-10 space-y-8">
        
        <!-- HEADER HUD -->
        <header class="flex flex-col md:flex-row justify-between items-start md:items-end gap-4 border-b border-cyan-500/20 pb-8 gsap-header">
            <div class="space-y-1">
                <h1 class="text-4xl md:text-5xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-600">
                    HPDC_MASTER_AGENT.v1
                </h1>
                <p class="text-gray-500 font-mono text-[10px] tracking-widest uppercase">
                    DIRECT_HARDWARE_INTERFACE / HOST: <span class="text-cyan-500" x-text="hostIp || '127.0.0.1'"></span> / V2.0.0_GMSH_ENGINE
                </p>
            </div>
            <div class="flex items-center gap-4">
                <div class="glass px-4 py-2 border-l-2 border-cyan-500 bg-cyan-500/5">
                    <p class="text-[9px] font-mono text-gray-500 uppercase">System_Status</p>
                    <p class="text-xs font-bold text-cyan-400 tracking-widest">LOCAL_CLUSTER_SYNC</p>
                </div>
            </div>
        </header>

        <!-- MAIN GRID -->
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 min-h-[700px]">
            
            <!-- LEFT: 3D VIEWPORT & STRUCTURAL MATRIX -->
            <div class="lg:col-span-4 flex flex-col gap-4 gsap-card">
                <div id="canvas-container" class="glass relative flex-1 min-h-[400px] overflow-hidden border border-white/5">
                    <div x-show="!stlUrl" class="absolute inset-0 flex flex-col items-center justify-center bg-black/40 backdrop-blur-sm z-20">
                        <div class="w-12 h-12 border-4 border-cyan-500 rounded-full border-t-transparent animate-spin mb-4 opacity-40"></div>
                        <p class="text-[10px] font-mono text-cyan-500 animate-pulse tracking-[0.3em]">AWAITING_STRUCTURAL_IO</p>
                    </div>
                </div>

                <!-- Structural Matrix -->
                <template x-if="analysis">
                    <div class="glass p-5 space-y-6 border-l-4 border-cyan-500/40 bg-cyan-500/5 backdrop-blur-xl">
                        <div class="flex justify-between items-center border-b border-white/5 pb-2">
                           <h3 class="text-[10px] font-bold text-cyan-400 uppercase tracking-widest">Structural_Matrix_Output</h3>
                           <span class="text-[8px] font-mono text-cyan-600 uppercase" x-text="analysis.engine"></span>
                        </div>

                        <!-- 1. Physical Node Cluster -->
                        <div class="grid grid-cols-3 gap-4">
                            <div class="gauge-box">
                                <p class="text-[8px] text-gray-500 uppercase font-mono mb-1">Vol_Disp</p>
                                <p class="text-xs font-mono text-white" x-text="`${(analysis.traits.volume/1000).toFixed(3)}cc`"></p>
                            </div>
                            <div class="gauge-box">
                                <p class="text-[8px] text-gray-500 uppercase font-mono mb-1">Surf_Area</p>
                                <p class="text-xs font-mono text-white" x-text="`${(analysis.traits.surface_area/100).toFixed(1)}cm²`"></p>
                            </div>
                            <div class="gauge-box">
                                <p class="text-[8px] text-gray-500 uppercase font-mono mb-1">Proj_Area</p>
                                <p class="text-xs font-mono text-cyan-400" x-text="`${(analysis.traits.projected_area/100).toFixed(2)}cm²`"></p>
                            </div>
                        </div>

                        <!-- 1.5 Bounding Box Display -->
                        <div class="gauge-box w-full bg-cyan-500/5">
                            <p class="text-[7px] text-gray-500 uppercase font-mono mb-1 tracking-widest">Bounding_Box_Extents (mm)</p>
                            <div class="flex justify-between items-end font-mono">
                                <template x-if="analysis.traits.dimensions">
                                    <div class="flex gap-4 text-[10px]">
                                        <span class="text-white" x-text="`X: ${analysis.traits.dimensions.x}`"></span>
                                        <span class="text-white" x-text="`Y: ${analysis.traits.dimensions.y}`"></span>
                                        <span class="text-white" x-text="`Z: ${analysis.traits.dimensions.z}`"></span>
                                    </div>
                                </template>
                            </div>
                        </div>

                        <!-- 2. Topology Resolution Matrix -->
                        <div class="space-y-3 pt-2">
                            <p class="text-[9px] font-bold text-gray-500 uppercase tracking-widest flex items-center gap-2">Topology_Nodes</p>
                            <div class="grid grid-cols-4 gap-2">
                                <div class="p-2 bg-white/5 rounded-sm border border-white/5">
                                    <p class="text-[7px] text-gray-600 uppercase">Faces</p>
                                    <p class="text-[10px] font-mono text-white" x-text="analysis.traits.topology?.faces"></p>
                                </div>
                                <div class="p-2 bg-white/5 rounded-sm border border-white/5">
                                    <p class="text-[7px] text-gray-600 uppercase">Edges</p>
                                    <p class="text-[10px] font-mono text-white" x-text="analysis.traits.topology?.edges"></p>
                                </div>
                                <div class="p-2 bg-white/5 rounded-sm border border-white/5">
                                    <p class="text-[7px] text-gray-600 uppercase">Verts</p>
                                    <p class="text-[10px] font-mono text-white" x-text="analysis.traits.topology?.vertices"></p>
                                </div>
                                <div class="p-2 bg-cyan-500/10 rounded-sm border border-cyan-500/20">
                                    <p class="text-[7px] text-cyan-700 uppercase font-bold">Solids</p>
                                    <p class="text-[10px] font-mono text-cyan-400" x-text="analysis.traits.topology?.solids"></p>
                                </div>
                            </div>
                        </div>

                        <!-- 3. Validation Signal -->
                        <div class="flex justify-between items-center pt-2 border-t border-white/5">
                            <div>
                                <p class="text-[9px] text-gray-500 uppercase mb-1">Geometric_Integrity</p>
                                <p class="text-[10px] font-mono" :class="analysis.traits.validation?.is_manifold ? 'text-cyan-400' : 'text-yellow-500'" 
                                   x-text="analysis.traits.validation?.is_manifold ? 'MANIFOLD_STABLE' : 'OPEN_BOUNDARY_DETECTED'"></p>
                            </div>
                            <div class="px-2 py-1 bg-cyan-500/20 rounded-sm">
                                <p class="text-[8px] font-bold text-cyan-400" x-text="`IQ: ${analysis.traits.validation?.integrity_score || 0}`"></p>
                            </div>
                        </div>
                    </div>
                </template>
            </div>

            <!-- CENTER: AGENT CONTROLS -->
            <div class="lg:col-span-4 space-y-6 gsap-card">
                <!-- Market Status -->
                <div class="flex flex-col gap-2">
                    <div class="flex-1 glass px-4 py-3 border-l-2 border-cyan-500 flex justify-between items-center bg-cyan-500/5">
                        <div class="flex flex-col">
                            <span class="text-[10px] font-mono text-cyan-400">LIVE_MARKET_STREAM</span>
                            <span class="text-[8px] font-mono text-gray-500" x-text="marketData ? `NEXT_SYNC: ${marketData.next_sync_display}` : ''"></span>
                        </div>
                        <div class="text-right">
                            <p class="text-white font-bold font-mono text-sm" x-text="marketData ? `$${(marketData.current_base_rates[metal]?.current_price || 0).toFixed(3)}/kg` : 'SYNCING...'"></p>
                            <p class="text-cyan-600 font-mono text-[10px]" x-text="marketData ? `₹${(marketData.current_base_rates[metal]?.current_price * marketData.exchange_rate).toFixed(2)}/kg` : ''"></p>
                        </div>
                    </div>
                </div>

                <!-- Price Chart Area -->
                <div class="glass p-5 h-[220px] relative overflow-hidden bg-white/[0.01] border-b-2 border-cyan-500/20">
                    <canvas id="priceChart"></canvas>
                </div>

                <!-- Upload Section -->
                <div class="glass p-6 group">
                    <label class="flex flex-col items-center justify-center w-full h-24 border-2 border-dashed rounded-xl cursor-pointer transition-all bg-white/[0.01]"
                           :class="isProcessing ? 'border-cyan-500/60 animate-pulse' : 'border-white/5 hover:border-cyan-500/40'">
                        <div class="flex flex-col items-center" x-show="!isProcessing">
                            <span class="text-2xl mb-2">📤</span>
                            <p class="text-[11px] text-gray-400 font-mono tracking-tighter" x-text="fileName ? fileName : 'INJECT_CAD_DATA (.step, .stl)'"></p>
                        </div>
                        <div x-show="isProcessing" class="flex flex-col items-center">
                            <div class="w-8 h-8 border-3 border-cyan-500 rounded-full border-t-transparent animate-spin mb-2"></div>
                            <p class="text-[10px] font-mono text-cyan-500 tracking-widest">AGENT_PROCESSING...</p>
                        </div>
                        <input type="file" class="hidden" @change="agentProcess" accept=".step,.stp,.stl,.obj,.iges,.igs">
                    </label>
                </div>

                <!-- Agent Parameters -->
                <div class="glass p-6 space-y-6">
                    <h2 class="text-xs font-bold text-gray-500 uppercase tracking-widest border-b border-white/5 pb-3">Agent_Configuration</h2>
                    <div class="space-y-5">
                        <!-- Metal -->
                        <div class="group">
                            <label class="text-[10px] text-gray-500 uppercase font-bold mb-2 block">Material_Node_Select</label>
                            <select class="w-full bg-black/60 border border-white/10 p-2 text-sm font-mono focus:border-cyan-500/40 outline-none rounded-sm" 
                                    x-model="metal" @change="resetHistory()">
                                <template x-for="m in (marketData ? Object.keys(marketData.current_base_rates) : [])">
                                    <option :value="m" x-text="m"></option>
                                </template>
                            </select>
                        </div>

                        <!-- Location Search -->
                        <div class="group relative">
                            <label class="text-[10px] text-gray-500 uppercase font-bold mb-2 block">Plant_Location_Search</label>
                            <div class="flex gap-2">
                                <input type="text" 
                                       class="flex-1 bg-black/60 border border-white/10 p-2 text-sm font-mono focus:border-cyan-500/40 outline-none rounded-sm"
                                       placeholder="Search City..."
                                       x-model="locationQuery"
                                       @input.debounce.300ms="searchLocation">
                            </div>
                            <!-- Results Dropdown -->
                            <div x-show="locationResults.length > 0" 
                                 class="absolute z-50 w-full mt-1 glass border border-cyan-500/30 bg-black/95 max-h-48 overflow-y-auto">
                                <template x-for="loc in locationResults">
                                    <div class="p-2 border-b border-white/5 hover:bg-cyan-500/10 cursor-pointer transition-colors"
                                         @click="selectLocation(loc)">
                                        <p class="text-xs font-bold" x-text="loc.name"></p>
                                        <p class="text-[10px] text-gray-500" x-text="`Multiplier: ×${loc.multiplier} | Status: ${loc.market_status}`"></p>
                                    </div>
                                </template>
                            </div>
                            <div class="mt-2 flex items-center justify-between px-2 py-1 bg-cyan-500/10 rounded-sm border border-cyan-500/20">
                                <span class="text-[9px] font-mono text-cyan-400" x-text="location.name"></span>
                                <span class="text-[9px] font-mono text-gray-500" x-text="`×${location.multiplier}`"></span>
                            </div>
                        </div>

                        <!-- Annual Volume -->
                        <div class="group">
                            <div class="flex justify-between mb-2">
                                <label class="text-[10px] text-gray-500 uppercase font-bold">Annual_Volume</label>
                                <span class="text-[10px] font-mono text-cyan-400" x-text="annualVolume ? `${Number(annualVolume).toLocaleString()} PCS` : 'N/A'"></span>
                            </div>
                            <div class="flex gap-2">
                                <input type="range" class="flex-1 accent-cyan-500" min="0" max="250000" step="1000" x-model="annualVolume">
                                <button class="text-[10px] font-mono text-gray-500 hover:text-white" @click="annualVolume = ''">CLR</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- RIGHT: ANALYTICS -->
            <div class="lg:col-span-4 space-y-6 gsap-card">
                <template x-if="costResult">
                    <div class="space-y-6">
                        <div class="glass p-8 bg-gradient-to-br from-cyan-500/10 to-transparent border-t-2 border-cyan-500/40 relative overflow-hidden">
                            <h2 class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-1 font-mono">Computed_Unit_Price</h2>
                            <p class="text-6xl font-black text-white tracking-tighter" x-text="`$${costResult.total_unit_cost}`"></p>
                            <div class="flex items-center gap-3 mt-1">
                                <p class="text-xl font-bold text-cyan-400/80 tracking-tight" x-text="`₹${(costResult.total_unit_cost * marketData.exchange_rate).toFixed(2)}`"></p>
                                <span class="px-2 py-0.5 bg-cyan-500/10 text-[9px] font-mono text-cyan-500 rounded border border-cyan-500/20">LIVE_RATE</span>
                            </div>
                            <div class="mt-8 h-[200px]">
                                <canvas id="breakdownChart"></canvas>
                            </div>
                        </div>

                        <!-- Tonnage Insight -->
                        <div class="glass p-5 grid grid-cols-2 gap-4 border-l-4 border-cyan-500/40 bg-white/[0.01]">
                            <div>
                                <p class="text-[10px] text-gray-500 uppercase font-mono">Machine_Force</p>
                                <p class="text-2xl font-bold font-mono" x-text="`${costResult.machine_details.selected_machine}T`"></p>
                            </div>
                            <div class="border-l border-white/5 pl-4">
                                <p class="text-[10px] text-gray-500 uppercase font-mono">Cycle_Profile</p>
                                <p class="text-2xl font-bold font-mono" x-text="`${costResult.machine_details.cycle_time_s}s`"></p>
                            </div>
                        </div>
                    </div>
                </template>
                <div x-show="!costResult" class="glass h-[600px] flex items-center justify-center p-10 opacity-30 border-dashed border-2 border-white/5 bg-cyan-500/5">
                    <div class="text-center space-y-4">
                        <span class="text-5xl block animate-pulse">📡</span>
                        <h3 class="text-[11px] uppercase font-bold tracking-[0.3em] font-mono">Awaiting_Sync...</h3>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="fixed bottom-0 left-0 right-0 z-50 glass border-t border-cyan-500/20 bg-black/80 h-10 flex items-center overflow-hidden">
        <div class="px-6 border-r border-cyan-500/20 bg-cyan-500/10 h-full flex items-center shrink-0">
            <span class="text-[9px] font-bold text-cyan-400 tracking-[0.2em] flex items-center gap-2 uppercase">
                <span class="w-2 h-2 bg-cyan-500 rounded-full animate-pulse"></span> INDUSTRY_FLUX
            </span>
        </div>
        
        <div class="flex-1 px-6 overflow-hidden flex items-center">
            <div class="flex gap-4 items-center">
                <span class="w-1.5 h-1.5 bg-cyan-500 rounded-full animate-ping"></span>
                <span class="text-[9px] font-mono text-gray-500 uppercase tracking-widest">Global_Market_Pulse / Direct_Feed_Active</span>
            </div>
        </div>

        <div class="px-6 border-l border-cyan-500/20 bg-black/40 h-full flex items-center shrink-0 gap-6">
            <div class="flex flex-col items-end">
                <p class="text-[8px] text-gray-500 uppercase leading-none mb-1">Global_Sync_Status</p>
                <p class="text-[9px] font-mono text-cyan-400 leading-none">REAL_TIME_ACTIVE</p>
            </div>
            <div class="h-6 w-px bg-white/5"></div>
            <div class="text-[10px] font-mono text-gray-400" x-text="new Date().toLocaleTimeString()"></div>
        </div>
    </footer>

    <script src="/static/app.js"></script>
</body>
</html>

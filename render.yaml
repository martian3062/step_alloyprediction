services:
  - type: web
    name: step-alloy-prediction
    runtime: docker
    env: python
    buildCommand: "docker build -t step-alloy-prediction ."
    startCommand: "gunicorn --bind 0.0.0.0:$PORT --workers 1 --threads 2 backend.app:app"
    envVars:
      - key: PORT
        value: 5000
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: METALS_API_KEY
        sync: false # Set this in Render dashboard
      - key: FLASK_ENV
        value: production
      - key: PYTHONPATH
        value: /app
    healthCheckPath: /api/health
    plan: free 
